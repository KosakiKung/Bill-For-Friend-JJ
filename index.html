<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#1A1A2E"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>SplitEasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F5F0;--card:#FFFFFF;
  --accent:#FF5C3A;--accent-lt:#FFF0ED;--accent-soft:#FFD6CE;
  --sage:#4CAF7D;--sage-lt:#E8F5EE;
  --ink:#1A1A2E;--muted:#8A8A9A;--border:#EDEAE4;
  --danger:#FF3B5C;--gold:#F5A623;--gold-lt:#FEF6E8;
  --blue:#3B82F6;--blue-lt:#EFF6FF;
  --purple:#8B5CF6;--purple-lt:#F5F3FF;
}
html{height:100%}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100%;overflow-x:hidden}
body.th{font-family:'Sarabun',sans-serif}
::-webkit-scrollbar{width:0}
input,button,select,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

.screen{min-height:100vh;padding-bottom:92px;animation:slideUp .28s cubic-bezier(.22,1,.36,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

.card{background:var(--card);border-radius:20px;padding:18px;box-shadow:0 2px 14px rgba(26,26,46,.07)}
.gap-col{display:flex;flex-direction:column;gap:14px}

.btn{width:100%;border:none;cursor:pointer;transition:transform .12s,opacity .12s;border-radius:16px;font-size:15px;font-weight:600;padding:15px 20px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:disabled{opacity:.4;pointer-events:none}
.btn-secondary{background:var(--accent-lt);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:14px}
.btn-ghost:active{background:var(--border)}
.btn-danger{background:#FEE2E2;color:var(--danger);border:none;border-radius:14px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
.btn-icon{background:var(--bg);border:none;border-radius:12px;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-sm{width:auto;padding:8px 16px;font-size:13px;border-radius:12px}

.lang-toggle{display:flex;background:rgba(255,255,255,.12);border-radius:100px;padding:3px;gap:2px}
.lang-btn{padding:5px 12px;border:none;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.5);transition:all .15s;letter-spacing:.03em}
.lang-btn.on{background:#fff;color:var(--accent)}

.input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;font-size:16px;color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none}
.input:focus{border-color:var(--accent);background:#fff}
.input::placeholder{color:var(--muted)}

.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}

.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-sm{width:32px;height:32px;font-size:11px}
.av-0{background:#FFD6CE;color:#FF5C3A}.av-1{background:#D6E8FF;color:#2563EB}
.av-2{background:#D6F5E3;color:#16A34A}.av-3{background:#FEF3C7;color:#D97706}
.av-4{background:#EDE9FE;color:#7C3AED}.av-5{background:#FCE7F3;color:#DB2777}
.av-6{background:#CCFBF1;color:#0D9488}.av-7{background:#FEE2E2;color:#DC2626}

.row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:13px 14px;box-shadow:0 1px 6px rgba(26,26,46,.05);cursor:pointer;transition:transform .12s}
.row:active{transform:scale(.98)}
.row+.row{margin-top:8px}

.pills{display:flex;background:var(--bg);border-radius:14px;padding:4px;gap:3px}
.pill{flex:1;padding:9px 6px;border-radius:11px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .18s;text-align:center}
.pill.on{background:var(--card);color:var(--accent);font-weight:700;box-shadow:0 2px 8px rgba(26,26,46,.08)}

.chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:12px;color:transparent}
.chk.on{background:var(--sage);border-color:var(--sage);color:#fff}
.chk-sq{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:12px;color:transparent}
.chk-sq.on{background:var(--sage);border-color:var(--sage);color:#fff}

.prog-track{background:var(--border);border-radius:100px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;background:var(--sage);transition:width .5s cubic-bezier(.22,1,.36,1)}

#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 0 20px;z-index:100;display:flex;justify-content:space-around}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 14px;transition:transform .12s;color:var(--muted)}
.nav-btn:active{transform:scale(.88)}
.nav-btn.on{color:var(--accent)}
.nav-btn .ni{font-size:22px;line-height:1}
.nav-btn .nl{font-size:10px;font-weight:500}
.nav-btn.on .nl{font-weight:700}

.overlay{position:fixed;inset:0;background:rgba(26,26,46,.45);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:430px;margin:0 auto;background:var(--card);border-radius:28px 28px 0 0;padding:20px 20px 36px;animation:sheetUp .3s cubic-bezier(.22,1,.36,1);max-height:88vh;overflow-y:auto}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 18px}

#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:100px;font-size:14px;font-weight:500;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(26,26,46,.2);transition:opacity .3s}
#toast.hide{opacity:0}

.hero{background:linear-gradient(145deg,#1A1A2E 0%,#2D2D4E 100%);padding:58px 20px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,92,58,.27),transparent 70%)}
.hero::after{content:'';position:absolute;bottom:-20px;left:20px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(76,175,125,.2),transparent 70%)}
.glass{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:18px;padding:16px 18px;border:1px solid rgba(255,255,255,.12)}

.emoji-grid{display:flex;flex-wrap:wrap;gap:8px}
.emoji-btn{width:48px;height:48px;border-radius:14px;font-size:22px;border:2px solid transparent;background:var(--bg);cursor:pointer;transition:all .15s}
.emoji-btn.on{border-color:var(--accent);background:var(--accent-lt)}

.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-hdr h3{font-family:'Fraunces',serif;font-size:19px;font-weight:700}

.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}

.cycle-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.cycle-monthly{background:var(--blue-lt);color:var(--blue)}
.cycle-weekly{background:var(--purple-lt);color:var(--purple)}

.cl-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:14px;margin-bottom:8px;transition:opacity .2s;box-shadow:0 1px 6px rgba(26,26,46,.05)}
.cl-item.done{opacity:.55}
.cl-item.done .cl-title{text-decoration:line-through;color:var(--muted)}

.owe-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.owe-row:last-child{border-bottom:none}

.txt-muted{color:var(--muted)}.txt-accent{color:var(--accent)}.txt-sage{color:var(--sage)}.txt-danger{color:var(--danger)}.txt-blue{color:var(--blue)}
.fw7{font-weight:700}.ff-s{font-family:'Fraunces',serif}
.fs-big{font-family:'Fraunces',serif;font-size:38px;font-weight:700;letter-spacing:-1px;line-height:1}
.px16{padding-left:16px;padding-right:16px}
.flex{display:flex}.items-center{align-items:center}.gap8{gap:8px}.gap12{gap:12px}
.flex1{flex:1;min-width:0}.text-right{text-align:right}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.w-full{width:100%}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.p20{padding:20px}.pt56{padding-top:56px}
.text-center{text-align:center}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty p{font-size:14px}
.divider{height:1px;background:var(--border)}

/* ── CATEGORY CHIPS ───────────────────────── */
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── DEBT BADGE ────────────────────────────── */
.debt-badge{background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-left:6px;vertical-align:middle}

/* ── BALANCE CARD (I Owe / Owed to me) ─────── */
.bal-card{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border-radius:16px;box-shadow:0 1px 6px rgba(26,26,46,.05);margin-bottom:8px}
.bal-card .amt-pill{padding:6px 14px;border-radius:100px;font-family:'Fraunces',serif;font-weight:700;font-size:15px;white-space:nowrap}
.bal-card .amt-owe{background:#FEE2E2;color:var(--danger)}
.bal-card .amt-owed{background:var(--sage-lt);color:var(--sage)}

/* ── SETTLE SHEET ──────────────────────────── */
.settle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settle-row:last-child{border-bottom:none}

/* ── MONTHLY SUMMARY ───────────────────────── */
.mo-section{background:var(--card);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(26,26,46,.05)}
.mo-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.mo-row:last-child{border-bottom:none}
.mo-total{background:linear-gradient(135deg,var(--ink),#2D2D4E);border-radius:16px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* ── SPENDING CHART (SVG bar chart) ────────── */
.chart-wrap{background:var(--card);border-radius:20px;padding:18px;box-shadow:0 2px 14px rgba(26,26,46,.07)}
.chart-bar-bg{fill:var(--border)}
.chart-bar-fill{fill:var(--accent);transition:height .5s cubic-bezier(.22,1,.36,1)}
.chart-label{font-size:10px;fill:var(--muted);font-family:'DM Sans',sans-serif;text-anchor:middle}
.chart-val{font-size:9px;fill:var(--ink);font-family:'Fraunces',serif;font-weight:700;text-anchor:middle}

/* ── NOTE FIELD ────────────────────────────── */
.note-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:72px;transition:border-color .2s;font-family:inherit}
.note-ta:focus{border-color:var(--accent);background:#fff}
.note-ta::placeholder{color:var(--muted)}

/* ── SUB-ITEM CARD ─────────────────────────── */
.sub-item-card{background:var(--bg);border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1.5px solid var(--border)}
.sub-item-card:last-child{margin-bottom:0}
.si-consumer-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.si-consumer-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.si-consumer-btn.on{border-color:var(--sage);background:var(--sage-lt);color:var(--sage)}
.si-total-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;margin-top:6px}
.si-total-ok{background:var(--sage-lt);color:var(--sage)}
.si-total-err{background:#FEE2E2;color:var(--danger)}
</style>
</head>

/* ── Balance computation (multi-payer aware) ─────────── */
function calcBal(members,expenses){
  const b={};members.forEach(m=>b[m.id]=0);
  expenses.forEach(exp=>{
    const amt=+exp.amount||0;if(!amt)return;
    const payers=exp.payers||[{id:exp.paidById,amt}];

    // 1) Credit each payer exactly what they paid
    payers.forEach(p=>{ b[p.id]=(b[p.id]||0)+(+p.amt||0); });

    // 2) Debit each person their actual share
    if(exp.subItems && exp.subItems.length>0){
      // Sub-item mode: debit per item per consumer
      exp.subItems.forEach(item=>{
        const consumers=item.consumers||[];
        if(!consumers.length)return;
        const share=(+item.price||0)/consumers.length;
        consumers.forEach(id=>{ b[id]=(b[id]||0)-share; });
      });
    } else {
      const ids=exp.participants||members.map(m=>m.id);
      if(exp.splitType==='equal'){
        const sh=amt/ids.length;
        ids.forEach(id=>{ b[id]=(b[id]||0)-sh; });
      } else if(exp.splitType==='multipayer'){
        // multipayer = everyone splits equally regardless of who paid
        const sh=amt/ids.length;
        ids.forEach(id=>{ b[id]=(b[id]||0)-sh; });
      } else if(exp.splitType==='percentage'){
        ids.forEach(id=>{ b[id]=(b[id]||0)-amt*((exp.percentages?.[id]||0)/100); });
      } else if(exp.splitType==='custom'){
        ids.forEach(id=>{ b[id]=(b[id]||0)-(+exp.customAmounts?.[id]||0); });
      }
    }
  });
  return b;
}

/* ── Greedy debt simplification ─────────────────────── */
function simplify(bals){
  const pos=[],neg=[];
  Object.entries(bals).forEach(([id,b])=>{
    if(b>0.5)pos.push({id,b});else if(b<-0.5)neg.push({id,b:-b});
  });
  const tx=[];let pi=0,ni=0;
  while(pi<pos.length&&ni<neg.length){
    const p=pos[pi],n=neg[ni],a=Math.min(p.b,n.b);
    tx.push({from:n.id,to:p.id,amount:a});
    p.b-=a;n.b-=a;if(p.b<0.5)pi++;if(n.b<0.5)ni++;
  }
  return tx;
}

function calcQS(){
  const a=+document.getElementById('qs-a')?.value||0,p=+document.getElementById('qs-p')?.value||1;
  const r=document.getElementById('qs-r'),v=document.getElementById('qs-v');
  if(a>0&&p>0){r?.classList.remove('hidden');if(v)v.textContent=fmt(a/p);}
  else r?.classList.add('hidden');
}

function addEGM(){
  const d=document.createElement('div');d.className='member-row';d.id='egm-'+uid();
  d.innerHTML=`<span class="av av-sm av-1" style="font-size:10px">N</span>

function doEG(gid){
  const g=getG(gid);
  const name=document.getElementById('eg-n').value.trim()||g.name;
  const emoji=document.querySelector('#eg-grid .emoji-btn.on')?.dataset.e||g.emoji;
  const members=[];
  document.querySelectorAll('#eg-m .member-row').forEach(row=>{
    const inp=row.querySelector('input[data-mid]');
    if(!inp){members.push(g.members.find(m=>m.isMe));return;}
    const mid=inp.dataset.mid,val=inp.value.trim();if(!val)return;
    if(mid.startsWith('new-'))members.push({id:uid(),name:val});
    else{const ex=g.members.find(m=>m.id===mid);if(ex)members.push({...ex,name:val});}
  });
  updG({...g,name,emoji,members});toast(t('groupUpdated'));go('group',gid);
}

/* ── Sub-item state & helpers ───────────── */
let _subItems=[];
let _expMode='simple';

function renderSIRow(g,item,idx){

    const on=(item.consumers||[]).includes(m.id);

        style="width:90px;padding:10px 12px;font-size:14px;font-family:'Fraunces',serif;font-weight:700;text-align:right"

function setMode(mode){
  _expMode=mode;
  document.getElementById('mode-simple')?.classList.toggle('on',mode==='simple');
  document.getElementById('mode-detail')?.classList.toggle('on',mode==='detail');
  document.getElementById('simple-mode-sec')?.classList.toggle('hidden',mode==='detail');
  document.getElementById('detail-mode-sec')?.classList.toggle('hidden',mode==='simple');
  if(mode==='simple')updSplit();else{updSITotal();}
  chkExpForm();
}

function addSI(){
  const g=getG(S.selectedGroupId);
  const item={id:uid(),name:'',price:0,consumers:g.members.map(m=>m.id)};
  _subItems.push(item);
  const list=document.getElementById('si-list');
  if(list){
    const div=document.createElement('div');
    div.innerHTML=renderSIRow(g,item,_subItems.length-1);
    list.appendChild(div.firstElementChild);
  }
  updSITotal();
}
function removeSI(iid){
  _subItems=_subItems.filter(s=>s.id!==iid);
  document.getElementById('si-'+iid)?.remove();
  updSITotal();chkExpForm();
}
function togSIC(iid,mid){
  const item=_subItems.find(s=>s.id===iid);if(!item)return;
  if(item.consumers.includes(mid))item.consumers=item.consumers.filter(c=>c!==mid);
  else item.consumers.push(mid);
  const btn=document.getElementById('sic-'+iid+'-'+mid);
  if(btn)btn.classList.toggle('on',item.consumers.includes(mid));
  updSITotal();chkExpForm();
}
function updSIName(iid,v){const s=_subItems.find(x=>x.id===iid);if(s)s.name=v;}
function updSIPrice(iid,v){const s=_subItems.find(x=>x.id===iid);if(s){s.price=v;updSITotal();}}
function updSITotal(){
  const tot=_subItems.reduce((a,s)=>a+(+s.price||0),0);
  const bar=document.getElementById('si-total-bar');
  const val=document.getElementById('si-total-val');
  const billAmt=+document.getElementById('ea')?.value||0;
  if(bar)bar.style.display=_subItems.length>0?'flex':'none';
  if(val){
    const ok=billAmt===0||Math.abs(tot-billAmt)<0.5;
    val.textContent=billAmt>0?`${fmt(tot)} / ${fmt(billAmt)}`:fmt(tot);
    val.style.color=ok?'var(--sage)':'var(--danger)';
    if(bar)bar.className='si-total-bar '+(ok?'si-total-ok':'si-total-err');
  }
  chkExpForm();
}

let _ST='equal';
function initAE(){
  _ST='equal';_expMode='simple';_subItems=[];
  updSplit();chkExpForm();
}
function selPayer(mid){
  document.querySelectorAll('.payer-btn').forEach(b=>{
    const s=b.dataset.id===mid;
    b.style.borderColor=s?'var(--accent)':'var(--border)';
    b.style.background=s?'var(--accent-lt)':'white';
    b.querySelector('span').style.color=s?'var(--accent)':'var(--ink)';
    b.classList.toggle('po',s);
  });
}
function togPart(mid){document.getElementById('chk-'+mid)?.classList.toggle('on');updSplit();}
function getParts(){
  const g=getG(S.selectedGroupId);
  return g.members.filter(m=>document.getElementById('chk-'+m.id)?.classList.contains('on')).map(m=>m.id);
}
function setST(tp){
  _ST=tp;
  document.querySelectorAll('#split-pills .pill').forEach((p,i)=>p.classList.toggle('on',['equal','custom','percentage','multipayer'][i]===tp));
  const g=getG(S.selectedGroupId);
  g.members.forEach(m=>{
    document.getElementById('eq-'+m.id)?.classList.toggle('hidden',tp!=='equal');
    document.getElementById('ca-'+m.id)?.classList.toggle('hidden',tp!=='custom');
    if(document.getElementById('pw-'+m.id))
      document.getElementById('pw-'+m.id).className=tp==='percentage'?'flex items-center gap8':'hidden';
  });
  document.getElementById('mp-sec')?.classList.toggle('hidden',tp!=='multipayer');
  const fl=document.getElementById('sf-lbl');
  if(fl){
    if(tp==='equal'||tp==='multipayer')fl.textContent=t('perPerson');
    else if(tp==='custom')fl.textContent=t('assignedTotal');
    else fl.textContent=t('totalPct');
  }
  updSplit();
}
function updSplit(){
  if(_expMode==='detail'){updSITotal();return;}
  const amt=+document.getElementById('ea')?.value||0,pts=getParts(),fv=document.getElementById('sf-val');
  if(!fv)return;
  if(_ST==='equal'||_ST==='multipayer'){
    const sh=pts.length?amt/pts.length:0;
    pts.forEach(id=>{const el=document.getElementById('eq-'+id);if(el)el.textContent=fmt(sh);});
    const g=getG(S.selectedGroupId);
    g.members.filter(m=>!pts.includes(m.id)).forEach(m=>{const el=document.getElementById('eq-'+m.id);if(el)el.textContent='';});
    fv.textContent=fmt(sh);fv.style.color='var(--accent)';
  } else if(_ST==='custom')updCustom();
  else if(_ST==='percentage')updPct();
  if(_ST==='multipayer')updMP();
  chkExpForm();
}
function updCustom(){
  const amt=+document.getElementById('ea')?.value||0,pts=getParts();let tot=0;
  pts.forEach(id=>{tot+=+document.getElementById('ca-'+id)?.value||0;});
  const ok=Math.abs(tot-amt)<0.5,fv=document.getElementById('sf-val');
  if(fv){fv.textContent=`${fmt(tot)} / ${fmt(amt)}`;fv.style.color=ok?'var(--sage)':'var(--danger)';}
  chkExpForm();
}
function updPct(){
  const pts=getParts();let tot=0;
  pts.forEach(id=>{tot+=+document.getElementById('pct-'+id)?.value||0;});
  const ok=Math.abs(tot-100)<0.5,fv=document.getElementById('sf-val');
  if(fv){fv.textContent=`${tot.toFixed(0)}%`;fv.style.color=ok?'var(--sage)':'var(--danger)';}
  chkExpForm();
}
function updMP(){
  const amt=+document.getElementById('ea')?.value||0;
  const g=getG(S.selectedGroupId);let tot=0;
  g.members.forEach(m=>{tot+=+document.getElementById('mp-'+m.id)?.value||0;});
  const ok=Math.abs(tot-amt)<0.5,fv=document.getElementById('mp-tv');
  if(fv){fv.textContent=`${fmt(tot)} / ${fmt(amt)}`;fv.style.color=ok?'var(--sage)':'var(--danger)';}
  chkExpForm();
}
function chkExpForm(){
  const amt=+document.getElementById('ea')?.value||0;
  const title=(document.getElementById('et')?.value||'').trim();
  let valid=amt>0&&title;
  if(_expMode==='detail'){
    const siTot=_subItems.reduce((a,s)=>a+(+s.price||0),0);
    valid=valid&&_subItems.length>0&&Math.abs(siTot-amt)<0.5&&_subItems.every(s=>s.consumers&&s.consumers.length>0);
  } else {
    const pts=getParts();valid=valid&&pts.length>0;
    if(_ST==='custom'){let ct=0;pts.forEach(id=>{ct+=+document.getElementById('ca-'+id)?.value||0;});valid=valid&&Math.abs(ct-amt)<0.5;}
    if(_ST==='percentage'){let pt=0;pts.forEach(id=>{pt+=+document.getElementById('pct-'+id)?.value||0;});valid=valid&&Math.abs(pt-100)<0.5;}
    if(_ST==='multipayer'){const g=getG(S.selectedGroupId);let mt=0;g.members.forEach(m=>{mt+=+document.getElementById('mp-'+m.id)?.value||0;});valid=valid&&Math.abs(mt-amt)<0.5;}
  }
  const b=document.getElementById('se-btn');if(b)b.disabled=!valid;
}
function doSaveExp(editId,gid){
  const g=getG(gid);
  const amt=+document.getElementById('ea').value||0;
  const title=document.getElementById('et').value.trim();
  const emoji=document.getElementById('ee-btn').dataset.e||'🍽️';
  const paidById=document.querySelector('.po')?.dataset.id||g.members[0].id;
  const payers=[{id:paidById,amt}];
  const prevNote=editId?g.expenses.find(e=>e.id===editId)?.note||'':'';
  const prevDate=editId?g.expenses.find(e=>e.id===editId)?.date:new Date().toISOString();

  let expData;
  if(_expMode==='detail'){
    const allConsumers=[...new Set(_subItems.flatMap(s=>s.consumers))];
    expData={id:editId||uid(),title,amount:amt,emoji,paidById,payers,
      splitType:'subitem',participants:allConsumers,
      subItems:_subItems.map(s=>({...s})),
      customAmounts:{},percentages:{},date:prevDate,note:prevNote};
  } else {
    const pts=getParts();
    const customAmounts={},percentages={};
    pts.forEach(id=>{
      customAmounts[id]=+document.getElementById('ca-'+id)?.value||0;
      percentages[id]=+document.getElementById('pct-'+id)?.value||0;
    });
    let finalPayers=payers;
    if(_ST==='multipayer'){
      finalPayers=[];
      g.members.forEach(m=>{const v=+document.getElementById('mp-'+m.id)?.value||0;if(v>0)finalPayers.push({id:m.id,amt:v});});
    }
    expData={id:editId||uid(),title,amount:amt,emoji,
      paidById:finalPayers[0]?.id||paidById,payers:finalPayers,
      splitType:_ST,participants:pts,customAmounts,percentages,
      subItems:[],date:prevDate,note:prevNote};
  }
  if(editId){updG({...g,expenses:g.expenses.map(e=>e.id===editId?expData:e)});toast(t('expenseUpdated'));}
  else{updG({...g,expenses:[...g.expenses,expData]});toast(t('expenseAdded'));}
  go('group',gid);
}
function openEP(){
  openSheet(`<p class="ff-s fw7" style="font-size:20px;margin-bottom:16px">${t('chooseEmoji')}</p>
    <div class="emoji-grid">${EE.map(({e,l})=>`<button onclick="pickEE('${e}')" style="background:var(--bg);border:none;border-radius:14px;padding:10px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px"><span style="font-size:26px">${e}</span><span style="font-size:10px;color:var(--muted)">${l}</span></button>`).join('')}</div>`);
}
function pickEE(e){const b=document.getElementById('ee-btn');if(b){b.textContent=e;b.dataset.e=e;}closeSheet();}

   SUMMARY
═══════════════════════════════════════════════════════════ */
function scrSummary(){
  const g=getG(S.selectedGroupId);if(!g)return go('home');
  const bals=calcBal(g.members,g.expenses),txns=simplify(bals);
  const total=g.expenses.reduce((a,e)=>a+(+e.amount||0),0);

  const bRows=g.members.map((m,i)=>{
    const b=bals[m.id]||0,col=b>=0?'var(--sage)':'var(--danger)';
    return `<div class="flex items-center gap12" style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div class="av ${avC(i)}">${(m.isMe?'Me':m.name).slice(0,2).toUpperCase()}</div>
      <div class="flex1"><p class="fw7" style="font-size:14px">${m.isMe?t('youLabel'):esc(m.name)}</p>
        <p class="txt-muted" style="font-size:12px">${b>=0?t('getsBack'):t('owes')}</p></div>
      <span class="ff-s fw7" style="font-size:18px;color:${col}">${b>=0?'+':'−'}${fmt(Math.abs(b))}</span>
    </div>`;
  }).join('');

  const sRows=txns.length===0
    ?`<div style="text-align:center;padding:20px;color:var(--sage)"><div style="font-size:28px">✅</div><p class="fw7 mt8">${t('allSettled')}</p></div>`
    :txns.map(tx=>{
        const fi=GI(g,tx.from),ti=GI(g,tx.to);
        return `<div class="flex items-center gap12" style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div class="av av-sm ${avC(fi)}">${GN(g,tx.from).slice(0,2).toUpperCase()}</div>
          <div class="flex1" style="font-size:13px;font-weight:500"><strong>${esc(GN(g,tx.from))}</strong> → <strong>${esc(GN(g,tx.to))}</strong></div>
          <div class="av av-sm ${avC(ti)}">${GN(g,tx.to).slice(0,2).toUpperCase()}</div>
          <span class="ff-s fw7 txt-accent" style="font-size:17px;margin-left:4px">${fmt(tx.amount)}</span>
        </div>`;
      }).join('');

  // Per-expense breakdown
  const expBD=[...g.expenses].reverse().map(exp=>{
    const amt=+exp.amount||0;
    const ids=exp.participants||g.members.map(m=>m.id);
    const payers=exp.payers||[{id:exp.paidById,amt}];
    const pm={};payers.forEach(p=>pm[p.id]=(pm[p.id]||0)+(+p.amt||0));
    const pStr=payers.map(p=>`${GN(g,p.id)} ${fmt(p.amt)}`).join(', ');
    let shares={};
    if(exp.subItems&&exp.subItems.length>0){
      exp.subItems.forEach(item=>{
        const c=item.consumers||[];if(!c.length)return;
        const sh=(+item.price||0)/c.length;
        c.forEach(id=>shares[id]=(shares[id]||0)+sh);
      });
    } else if(exp.splitType==='equal'||exp.splitType==='multipayer'){const s=amt/ids.length;ids.forEach(id=>shares[id]=s);}
    else if(exp.splitType==='percentage'){ids.forEach(id=>shares[id]=amt*((exp.percentages?.[id]||0)/100));}
    else if(exp.splitType==='custom'){ids.forEach(id=>shares[id]=+exp.customAmounts?.[id]||0);}
    // For display: use all people who either paid or have a share
    const allIds=[...new Set([...Object.keys(shares),...Object.keys(pm)])];
    return `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:22px">${exp.emoji}</span>
        <div class="flex1"><p class="fw7" style="font-size:14px">${esc(exp.title)}</p>
          <span style="background:var(--accent-lt);color:var(--accent);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600">${pStr}${exp.splitType==='subitem'?' · 🧾':''}</span>
        </div>
        <span class="ff-s fw7" style="font-size:16px">${fmt(amt)}</span>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:8px">
        ${allIds.map(id=>{
          const idx=GI(g,id);
          const share=shares[id]||0,paid=pm[id]||0,net=share-paid;
          return `<div class="owe-row">
            <div style="display:flex;align-items:center;gap:6px">
              <div class="av av-sm ${avC(idx)}" style="width:26px;height:26px;font-size:10px">${GN(g,id).slice(0,2).toUpperCase()}</div>
              <span style="font-size:13px;font-weight:600">${GN(g,id)}</span>
            </div>
            <div style="text-align:right">
              <p style="font-size:10px;color:var(--muted)">${t('share')}: ${fmt(share)}${paid>0?' / paid '+fmt(paid):''}</p>
              <span style="font-size:13px;color:${net>0.5?'var(--danger)':net<-0.5?'var(--blue)':'var(--sage)'};font-weight:700">
                ${net>0.5?'owes '+fmt(net):net<-0.5?'gets '+fmt(-net):'✓'}
              </span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  return `<div class="screen">
    <div class="flex items-center gap12 p20 pt56">
      <button class="btn-icon" onclick="go('group','${g.id}')">←</button>
      <h1 class="ff-s" style="font-size:24px;font-weight:700">${t('summaryTitle')}</h1>
    </div>
    <div class="px16 gap-col">
      <div class="card" style="background:linear-gradient(135deg,#1A1A2E,#2D2D4E);padding:24px">
        <p style="color:rgba(255,255,255,.55);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em">${t('totalSpent')}</p>
        <p class="fs-big" style="color:#fff;margin-top:6px">${fmt(total)}</p>
        <p style="color:rgba(255,255,255,.45);font-size:13px;margin-top:6px">${g.expenses.length} ${t('items')} · ${g.members.length} ${t('people')}</p>
      </div>
      <div class="card"><p class="lbl">${t('individualBalances')}</p>${bRows}</div>
      <div class="card"><p class="lbl">${t('settlementPlan')}</p>
        <p class="txt-muted" style="font-size:12px;margin-bottom:12px">${t('minTransfers')}</p>${sRows}</div>
      ${txns.length>0?`<button class="btn btn-primary" onclick="settleAll('${g.id}')">${t('markAllSettled')}</button>`:''}
      <div class="sec-hdr"><h3>${t('expDetailTitle')}</h3></div>
      ${expBD||`<div class="empty"><p>${t('noExpenses')}</p></div>`}
      <div style="height:10px"></div>
    </div>
  </div>`;
}
function settleAll(gid){const g=getG(gid);updG({...g,expenses:[]});toast(t('allSettledToast'));go('group',gid);}

      <div><h1 class="ff-s" style="font-size:22px;font-weight:700">${t('billCyclesTitle')}</h1>

    </div>
    <div class="px16 gap-col">
      <div class="card gap-col">
        <p class="lbl">${t('newCycle')}</p>
        <input class="input" id="cn" placeholder="${t('cycleNamePh')}"/>

          <div><p style="font-size:12px;color:var(--muted);margin-bottom:4px">${t('cycleAmt')}</p>

            <div class="pills"><button class="pill on" id="cf-mo" onclick="setCF('monthly')">${t('monthly')}</button>

function setCF(f){_CF=f;document.getElementById('cf-mo')?.classList.toggle('on',f==='monthly');document.getElementById('cf-wk')?.classList.toggle('on',f==='weekly');}
function nextDue(c){
  const start=new Date(c.startDate||todayStr()),today=new Date();let d=new Date(start);
  while(d<=today){if(c.freq==='weekly')d.setDate(d.getDate()+7);else d.setMonth(d.getMonth()+1);}
  return d;
}
function addCycle(gid){

  const cycle={id:uid(),name,amount,freq:_CF,startDate:document.getElementById('cs').value||todayStr(),endDate:document.getElementById('ce').value||null,paidDates:[]};
  updG({...g,cycles:[...(g.cycles||[]),cycle]});toast(t('planAdded'));go('cycles',gid);
}

}
function delCycle(gid,cid){const g=getG(gid);updG({...g,cycles:(g.cycles||[]).filter(c=>c.id!==cid)});toast(t('planRemoved'));render();}

/* ═══════════════════════════════════════════════════════════
   CHECKLIST
═══════════════════════════════════════════════════════════ */
function scrChecklist(){
  const g=getG(S.selectedGroupId);if(!g)return go('home');
  if(!g.checkItems)g.checkItems=[];
  const filter=S.clFilter||'all';

  // Build items from expenses + cycles
  let items=[
    ...(g.cycles||[]).map(c=>{
      const nd=nextDue(c);
      return {id:'cyc-'+c.id,label:`${c.name} (${nd.toLocaleDateString(S.lang==='th'?'th-TH':'en-GB')})`,amount:c.amount,emoji:'🔄',type:'cycle',done:c.paidDates?.includes(todayStr())||false};
    }),
    ...g.expenses.map(exp=>({id:'exp-'+exp.id,label:exp.title,amount:exp.amount,emoji:exp.emoji,type:'expense',done:false})),
  ];
  // Apply persisted done states
  items=items.map(item=>{const sv=g.checkItems?.find(c=>c.id===item.id);return sv?{...item,done:sv.done}:item;});

  const shown=items.filter(i=>filter==='all'||(filter==='paid'&&i.done)||(filter==='unpaid'&&!i.done));
  const totalAmt=items.reduce((a,i)=>a+(+i.amount||0),0);
  const paidAmt=items.filter(i=>i.done).reduce((a,i)=>a+(+i.amount||0),0);
  const prog=totalAmt>0?Math.round(paidAmt/totalAmt*100):0;

  const html=shown.length===0
    ?`<div class="empty"><div class="ei">✅</div><p>${filter==='unpaid'?t('allSettled'):t('noChecklist')}</p></div>`
    :shown.map(item=>`<div class="cl-item${item.done?' done':''}">
        <div class="chk-sq${item.done?' on':''}" onclick="togCI('${g.id}','${item.id}',${!item.done})">✓</div>
        <span style="font-size:18px">${item.emoji}</span>
        <div class="flex1">
          <p class="cl-title fw7" style="font-size:14px">${esc(item.label)}</p>
          <span style="font-size:11px;color:var(--muted)">${item.type==='cycle'?'🔄 '+t('billCycles'):'💸 '+t('expenses')}</span>
        </div>
        <span class="ff-s fw7" style="font-size:14px;color:${item.done?'var(--sage)':'var(--ink)'}">${fmt(item.amount)}</span>
      </div>`).join('');

  return `<div class="screen">
    <div class="flex items-center gap12 p20 pt56">
      <button class="btn-icon" onclick="go('group','${g.id}')">←</button>
      <h1 class="ff-s" style="font-size:22px;font-weight:700">${t('checklistTitle')}</h1>
    </div>
    <div class="px16 gap-col">
      <div class="card" style="background:linear-gradient(135deg,var(--sage-lt),#fff)">
        <div class="grid3" style="text-align:center">
          <div><p class="ff-s fw7 txt-sage" style="font-size:18px">${fmt(paidAmt)}</p><p style="font-size:11px;color:var(--muted);font-weight:600">${t('paid3')}</p></div>
          <div><p class="ff-s fw7 txt-danger" style="font-size:18px">${fmt(totalAmt-paidAmt)}</p><p style="font-size:11px;color:var(--muted);font-weight:600">${t('remaining')}</p></div>
          <div><p class="ff-s fw7" style="font-size:18px">${fmt(totalAmt)}</p><p style="font-size:11px;color:var(--muted);font-weight:600">${t('total')}</p></div>
        </div>
        <div class="prog-track" style="margin-top:12px"><div class="prog-fill" style="width:${prog}%"></div></div>
      </div>
      <div class="pills">
        <button class="pill${filter==='all'?' on':''}" onclick="S.clFilter='all';render()">${t('all')}</button>
        <button class="pill${filter==='paid'?' on':''}" onclick="S.clFilter='paid';render()">${t('paid3')}</button>
        <button class="pill${filter==='unpaid'?' on':''}" onclick="S.clFilter='unpaid';render()">${t('unpaid2')}</button>
      </div>
      ${html}
      <div style="height:10px"></div>
    </div>
  </div>`;
}
function togCI(gid,itemId,done){
  const g=getG(gid);
  const updated=(g.checkItems||[]).filter(c=>c.id!==itemId);
  updated.push({id:itemId,done});
  updG({...g,checkItems:updated});render();
}

/* ═══════════════════════════════════════════════════════════
   MONTHLY SUMMARY — expenses + cycles + installments
═══════════════════════════════════════════════════════════ */
function scrMonthlySummary(){
  const g=getG(S.selectedGroupId);if(!g)return go('home');
  const now=new Date();
  const mo=now.getMonth(),yr=now.getFullYear();
  const moLabel=now.toLocaleDateString(S.lang==='th'?'th-TH':'en-GB',{month:'long',year:'numeric'});
  const nm=g.members.length;

  // 1) One-time expenses this month
  const oneTime=g.expenses.filter(e=>{
    const d=new Date(e.date);return d.getMonth()===mo&&d.getFullYear()===yr;
  });
  const oneTimeTotal=oneTime.reduce((a,e)=>a+(+e.amount||0),0);

  // 2) Bill cycles — amount due this month
  const cyclesThisMonth=(g.cycles||[]).filter(c=>{
    const start=new Date(c.startDate||todayStr());
    const end=c.endDate?new Date(c.endDate):null;
    if(start>new Date(yr,mo+1,0))return false;
    if(end&&end<new Date(yr,mo,1))return false;
    return true;
  });
  const cyclesTotal=cyclesThisMonth.reduce((a,c)=>a+(+c.amount||0),0);

  // 3) Installments — monthly payment due
  const instThisMonth=(g.installments||[]).filter(p=>p.paidMonths<p.numMonths);
  const instTotal=instThisMonth.reduce((a,p)=>a+(p.totalAmt/p.numMonths),0);

  const grandTotal=oneTimeTotal+cyclesTotal+instTotal;
  const perPerson=nm>0?grandTotal/nm:0;

  // Spending chart data — last 6 months
  const chartData=[];
  for(let i=5;i>=0;i--){
    const d=new Date(yr,mo-i,1);
    const mm=d.getMonth(),yy=d.getFullYear();
    const tot=g.expenses.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===mm&&ed.getFullYear()===yy;})
      .reduce((a,e)=>a+(+e.amount||0),0);
    chartData.push({label:d.toLocaleDateString(S.lang==='th'?'th-TH':'en-GB',{month:'short'}),val:tot});
  }
  const maxVal=Math.max(...chartData.map(d=>d.val),1);

  // SVG bar chart
  const W=340,H=110,BAR_W=32,GAP=(W-6*BAR_W)/7;
  const bars=chartData.map((d,i)=>{
    const bh=Math.max(4,Math.round((d.val/maxVal)*(H-30)));
    const x=GAP+(BAR_W+GAP)*i;const y=H-20-bh;
    const isNow=i===5;
    return `<rect x="${x}" y="${H-20}" width="${BAR_W}" height="0" rx="6" class="chart-bar-bg"/>
      <rect x="${x}" y="${y}" width="${BAR_W}" height="${bh}" rx="6" fill="${isNow?'var(--accent)':'var(--accent-soft)'}"/>
      <text x="${x+BAR_W/2}" y="${H-4}" class="chart-label">${d.label}</text>
      ${d.val>0?`<text x="${x+BAR_W/2}" y="${y-4}" class="chart-val">${d.val>=1000?Math.round(d.val/1000)+'k':Math.round(d.val)}</text>`:''}`;
  }).join('');

  const oneTimeRows=oneTime.length===0
    ?`<p class="txt-muted" style="font-size:13px;padding:8px 0">${t('noExpenses')}</p>`
    :oneTime.map(e=>`<div class="mo-row">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">${e.emoji}</span>
          <span style="font-size:13px;font-weight:600">${esc(e.title)}</span>
        </div>
        <span class="ff-s fw7" style="font-size:14px">${fmt(e.amount)}</span>
      </div>`).join('');

  const cycleRows=cyclesThisMonth.length===0
    ?`<p class="txt-muted" style="font-size:13px;padding:8px 0">${t('noCycles')}</p>`
    :cyclesThisMonth.map(c=>`<div class="mo-row">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">🔄</span>
          <div>
            <span style="font-size:13px;font-weight:600">${esc(c.name)}</span>
            <span class="cycle-badge ${c.freq==='weekly'?'cycle-weekly':'cycle-monthly'}" style="margin-left:6px">${c.freq==='weekly'?t('weekly'):t('monthly')}</span>
          </div>
        </div>
        <span class="ff-s fw7" style="font-size:14px">${fmt(c.amount)}</span>

/* ═══════════════════════════════════════════════════════════
   I OWE / I AM OWED — Cross-group dashboard
═══════════════════════════════════════════════════════════ */
function scrIOwe(){
  // Compute all debts & credits across every group
  const iOweList=[],iAmOwedList=[];
  S.groups.forEach(g=>{
    const bals=calcBal(g.members,g.expenses);
    const myId=g.members[0]?.id;if(!myId)return;
    const myBal=bals[myId]||0;
    const txns=simplify(bals);
    // I owe: transactions where from===myId
    txns.filter(tx=>tx.from===myId).forEach(tx=>{
      iOweList.push({gid:g.id,gname:g.name,gemoji:g.emoji,toId:tx.to,toName:GN(g,tx.to),toIdx:GI(g,tx.to),amount:tx.amount});
    });
    // I am owed: transactions where to===myId
    txns.filter(tx=>tx.to===myId).forEach(tx=>{
      iAmOwedList.push({gid:g.id,gname:g.name,gemoji:g.emoji,fromId:tx.from,fromName:GN(g,tx.from),fromIdx:GI(g,tx.from),amount:tx.amount});
    });
  });

  const totalIOwe=iOweList.reduce((a,x)=>a+x.amount,0);
  const totalOwed=iAmOwedList.reduce((a,x)=>a+x.amount,0);

  const oweRows=iOweList.length===0
    ?`<p class="txt-muted" style="font-size:13px;padding:10px 0;text-align:center">${t('noDebts')}</p>`
    :iOweList.map(x=>`<div class="bal-card">
        <div class="av av-sm ${avC(x.toIdx)}">${x.toName.slice(0,2).toUpperCase()}</div>
        <div class="flex1">
          <p class="fw7" style="font-size:14px">${esc(x.toName)}</p>
          <p class="txt-muted" style="font-size:12px">${x.gemoji} ${esc(x.gname)}</p>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="amt-pill amt-owe">${fmt(x.amount)}</span>
          <button onclick="openSettleSheet('${x.gid}','${x.toId}',${x.amount.toFixed(2)})" style="font-size:11px;font-weight:700;color:var(--accent);background:none;border:none;cursor:pointer">${t('settleWith')} →</button>
        </div>
      </div>`).join('');

  const owedRows=iAmOwedList.length===0
    ?`<p class="txt-muted" style="font-size:13px;padding:10px 0;text-align:center">${t('noDebts')}</p>`
    :iAmOwedList.map(x=>`<div class="bal-card">
        <div class="av av-sm ${avC(x.fromIdx)}">${x.fromName.slice(0,2).toUpperCase()}</div>
        <div class="flex1">
          <p class="fw7" style="font-size:14px">${esc(x.fromName)}</p>
          <p class="txt-muted" style="font-size:12px">${x.gemoji} ${esc(x.gname)}</p>
        </div>
        <span class="amt-pill amt-owed">${fmt(x.amount)}</span>
      </div>`).join('');

  return `<div class="screen">
    <div class="hero">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <p style="color:rgba(255,255,255,.5);font-size:13px;font-weight:500">${t('acrossGroups')}</p>${LT()}
      </div>
      <h1 class="ff-s" style="color:#fff;font-size:28px;font-weight:700;margin-bottom:18px">${t('ioweDashboard')}</h1>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="glass">
          <p style="color:rgba(255,255,255,.55);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${t('iOwe')}</p>
          <p class="ff-s fw7" style="color:var(--danger);font-size:26px">−${fmt(totalIOwe)}</p>
        </div>
        <div class="glass">
          <p style="color:rgba(255,255,255,.55);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${t('iAmOwed')}</p>
          <p class="ff-s fw7" style="color:var(--sage);font-size:26px">+${fmt(totalOwed)}</p>
        </div>
      </div>
    </div>
    <div class="p20 gap-col">
      <div>
        <p class="lbl" style="color:var(--danger)">${t('iOwe')}</p>
        ${oweRows}
      </div>
      <div>
        <p class="lbl" style="color:var(--sage)">${t('iAmOwed')}</p>
        ${owedRows}
      </div>
      <div style="height:10px"></div>
    </div>
  </div>`;
}

/* ── Settle with specific person sheet ───── */
function openSettleSheet(gid,toId,suggestedAmt){
  const g=getG(gid);const toName=GN(g,toId);
  openSheet(`
    <p class="ff-s fw7" style="font-size:20px;margin-bottom:4px">${t('settleWith')} ${esc(toName)}</p>
    <p class="txt-muted" style="font-size:13px;margin-bottom:18px">${g.emoji} ${esc(g.name)}</p>
    <p class="lbl">${t('settleAmount')}</p>
    <input class="input mb12" type="number" inputmode="decimal" id="stl-amt" value="${suggestedAmt}" style="font-family:'Fraunces',serif;font-size:22px;font-weight:700"/>
    <p class="lbl">${t('settleNote')}</p>
    <textarea class="note-ta mb12" id="stl-note" placeholder="${t('settleNote')}"></textarea>
    <button class="btn btn-primary" onclick="doSettle('${gid}','${toId}')">${t('recordPayment')}</button>
    <button class="btn btn-ghost mt8" onclick="closeSheet()">${t('cancel')}</button>
  `);
}
function doSettle(gid,toId){
  const g=getG(gid);
  const myId=g.members[0]?.id;
  const amt=+document.getElementById('stl-amt')?.value||0;
  const note=document.getElementById('stl-note')?.value||'';
  if(!amt){toast(t('fillTitleAmt'));return;}
  // Record as a settlement expense: payer=me, owed=toId, amt=0 share (just credit)
  const exp={
    id:uid(),title:`${t('settleWith')} ${GN(g,toId)}${note?' – '+note:''}`,
    amount:amt,emoji:'💸',paidById:myId,
    payers:[{id:myId,amt}],
    splitType:'custom',
    participants:[toId],
    customAmounts:{[toId]:amt},
    percentages:{},
    date:new Date().toISOString(),
    isSettlement:true,
  };
  updG({...g,expenses:[...g.expenses,exp]});
  closeSheet();toast(t('paymentRecorded'));
  go('iowe');
}

/* ── Override openExpDetail to include note button ── */
function openExpDetail(gid,eid){
  const g=getG(gid),exp=g.expenses.find(e=>e.id===eid);if(!exp)return;
  const amt=+exp.amount||0;
  const payers=exp.payers||[{id:exp.paidById,amt}];
  const pm={};payers.forEach(p=>pm[p.id]=(pm[p.id]||0)+(+p.amt||0));

  // Compute per-person shares (handles subitem mode too)
  const shares={};
  if(exp.subItems&&exp.subItems.length>0){
    exp.subItems.forEach(item=>{
      const c=item.consumers||[];if(!c.length)return;
      const sh=(+item.price||0)/c.length;
      c.forEach(id=>shares[id]=(shares[id]||0)+sh);
    });
  } else {
    const ids=exp.participants||g.members.map(m=>m.id);
    if(exp.splitType==='equal'||exp.splitType==='multipayer'){const s=amt/ids.length;ids.forEach(id=>shares[id]=s);}
    else if(exp.splitType==='percentage'){ids.forEach(id=>shares[id]=amt*((exp.percentages?.[id]||0)/100));}
    else if(exp.splitType==='custom'){ids.forEach(id=>shares[id]=+exp.customAmounts?.[id]||0);}
  }

  const allIds=[...new Set([...Object.keys(shares),...Object.keys(pm)])];

  const pRows=payers.map(p=>{
    const idx=GI(g,p.id);
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div class="av av-sm ${avC(idx)}">${GN(g,p.id).slice(0,2).toUpperCase()}</div>
      <span class="flex1 fw7" style="font-size:13px">${GN(g,p.id)}</span>
      <span style="background:var(--accent-lt);color:var(--accent);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700">${fmt(p.amt)}</span>
    </div>`;
  }).join('');

  // Sub-item breakdown section
  const siSection=exp.subItems&&exp.subItems.length>0?`
    <p class="lbl" style="margin-top:16px">🧾 ${t('subItems')}</p>
    ${exp.subItems.map(item=>{
      const c=item.consumers||[];const sh=c.length?(+item.price||0)/c.length:0;
      return `<div style="background:var(--bg);border-radius:12px;padding:10px 12px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="fw7" style="font-size:13px">${esc(item.name||'?')}</span>
          <span class="ff-s fw7 txt-accent" style="font-size:14px">${fmt(item.price||0)}</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${c.map(id=>{
            const idx=GI(g,id);
            return `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:3px 9px;font-size:11px;font-weight:600">
              <span class="av av-sm ${avC(idx)}" style="width:16px;height:16px;font-size:8px">${GN(g,id).slice(0,1)}</span>
              ${GN(g,id)} <span class="txt-muted">${fmt(sh)}</span>
            </span>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}`:'';

  const oRows=allIds.map(id=>{
    const idx=GI(g,id);
    const share=shares[id]||0;
    const paid=pm[id]||0;
    const net=share-paid; // positive = owes, negative = overpaid
    return `<div class="owe-row">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="av av-sm ${avC(idx)}">${GN(g,id).slice(0,2).toUpperCase()}</div>
        <span class="fw7" style="font-size:13px">${GN(g,id)}</span>
      </div>
      <div class="text-right">
        <p style="font-size:11px;color:var(--muted)">${t('share')}: ${fmt(share)}${paid>0?' · paid: '+fmt(paid):''}</p>
        <p class="ff-s fw7" style="font-size:14px;color:${net>0.5?'var(--danger)':net<-0.5?'var(--blue)':'var(--sage)'}">
          ${net>0.5?t('owedAmt')+': '+fmt(net):net<-0.5?'↩ gets back '+fmt(-net):'✓ '+t('paid')}
        </p>
      </div>
    </div>`;
  }).join('');

  openSheet(`
    <p class="ff-s fw7" style="font-size:20px;margin-bottom:4px">${esc(exp.title)}</p>
    <p class="txt-muted" style="font-size:13px;margin-bottom:${exp.note?'10px':'16px'}">${exp.emoji} · ${fmt(amt)} · ${exp.splitType==='subitem'?t('detailMode'):exp.splitType}</p>
    ${exp.note?`<div style="background:var(--gold-lt);border-radius:12px;padding:10px 14px;margin-bottom:14px"><p style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:2px">📝 ${t('noteLabel')}</p><p style="font-size:13px;color:var(--ink)">${esc(exp.note)}</p></div>`:''}
    <p class="lbl">${t('payer')}</p>${pRows}
    ${siSection}
    <p class="lbl" style="margin-top:16px">${t('participants')} — ${t('share')} & ${t('owedAmt')}</p>
    <div style="background:var(--card);border-radius:14px;border:1px solid var(--border);padding:0 4px">${oRows}</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeSheet();openNoteEditor('${gid}','${eid}')">📝 ${t('noteLabel')}</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeSheet()">${t('cancel')}</button>
    </div>
  `);
}
function render(){
  document.body.className=S.lang==='th'?'th':'';
  const screens={
    'home':()=>{S.activeNav='home';return scrHome();},
    'create-group':scrCreateGroup,
    'edit-group':scrEditGroup,
    'group':scrGroupFiltered,
    'add-expense':()=>scrAddExp(null),
    'edit-expense':()=>scrAddExp(S.editExpenseId),
    'summary':scrSummary,
    'monthly':scrMonthlySummary,
    'installments':scrInstall,
    'cycles':scrCycles,
    'checklist':scrChecklist,
    'iowe':()=>{S.activeNav='iowe';return scrIOwe();},
    'activity':()=>{S.activeNav='activity';return scrActivity();},
    'profile':()=>{S.activeNav='profile';return scrProfile();},
  };
  const fn=screens[S.screen]||screens['home'];
  const html=fn();
  const ex=document.getElementById('mc');if(ex)ex.remove();
  const div=document.createElement('div');div.id='mc';div.innerHTML=html;
  document.getElementById('app').insertBefore(div,document.getElementById('bottom-nav'));
  renderNav();
  if(S.screen==='create-group')initCG();
  if(S.screen==='add-expense'){_ST='equal';updSplit();chkExpForm();}
  if(S.screen==='edit-expense'){
    const _exp=getG(S.selectedGroupId)?.expenses.find(e=>e.id===S.editExpenseId);
    if(_exp?.subItems&&_exp.subItems.length>0){
      // subitem mode - _subItems and _expMode already pre-populated in scrAddExp
      setMode('detail');updSITotal();
    } else {
      _ST=_exp?.splitType||'equal';setST(_ST);updSplit();
    }
    chkExpForm();
  }
  if(S.screen==='installments'){_ICT='monthly';prvInst();}
  if(S.screen==='cycles')_CF='monthly';
  window.scrollTo(0,0);
}

/* ═══════════════ BOOT ═══════════════════════════════════ */
load();render();
</script>
<!-- ── COPY CODE BUTTON ──────────────────────────────── -->
<button id="copy-btn" onclick="copyCode()" title="Copy all code"
  style="position:fixed;bottom:28px;right:16px;z-index:9999;
    width:52px;height:52px;border-radius:50%;border:none;
    background:linear-gradient(135deg,#1A1A2E,#2D2D4E);
    color:#fff;font-size:22px;cursor:pointer;
    box-shadow:0 4px 20px rgba(26,26,46,.35);
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s,opacity .15s">
  📋
</button>
<div id="copy-toast"
  style="position:fixed;bottom:90px;right:16px;z-index:9999;
    background:#1A1A2E;color:#fff;padding:8px 16px;
    border-radius:100px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .3s;
    white-space:nowrap;box-shadow:0 4px 16px rgba(26,26,46,.3)">
  ✅ Copied!
</div>
<script>
function copyCode(){
  const btn=document.getElementById('copy-btn');
  const ct=document.getElementById('copy-toast');
  fetch(window.location.href)
    .then(r=>r.text())
    .then(html=>{
      navigator.clipboard.writeText(html).then(()=>{
        btn.textContent='✅';
        ct.style.opacity='1';
        setTimeout(()=>{btn.textContent='📋';ct.style.opacity='0';},2000);
      }).catch(()=>{
        // Fallback: textarea trick
        const ta=document.createElement('textarea');
        ta.value=html;ta.style.position='fixed';ta.style.opacity='0';
        document.body.appendChild(ta);ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent='✅';ct.style.opacity='1';
        setTimeout(()=>{btn.textContent='📋';ct.style.opacity='0';},2000);
      });
    });
}
document.getElementById('copy-btn').addEventListener('mousedown',function(){this.style.transform='scale(.9)';});
document.getElementById('copy-btn').addEventListener('mouseup',function(){this.style.transform='scale(1)';});
document.getElementById('copy-btn').addEventListener('touchstart',function(){this.style.transform='scale(.9)';},{passive:true});
document.getElementById('copy-btn').addEventListener('touchend',function(){this.style.transform='scale(1)';},{passive:true});
</script>
</body>
